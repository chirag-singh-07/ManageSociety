services:
  - type: web
    name: managesociety-api
    runtime: node
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    buildFilter:
      paths:
        - backend/**
    envVars:
      - key: NODE_VERSION
        value: 20.11.1
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 30d
      - key: ALLOWED_ORIGINS
        sync: false
      - key: SUPERADMIN_BOOTSTRAP_KEY
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_REGION
        value: auto
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_PUBLIC_BASE_URL
        sync: false

  # Optional: keep-alive cron job for free instances that may spin down.
  # Note: Render cron jobs are billed separately (minimum charge applies).
  - type: cron
    name: managesociety-keepalive
    runtime: node
    plan: starter
    region: singapore
    rootDir: backend
    schedule: "*/10 * * * *"
    buildCommand: npm ci --omit=dev
    startCommand: node scripts/ping.js
    envVars:
      - key: PING_URL
        sync: false

