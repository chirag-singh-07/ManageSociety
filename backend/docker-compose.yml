services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
  api:
    build: .
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - MONGODB_URI=mongodb://mongo:27017/managesociety
      - JWT_ACCESS_SECRET=dev_access_secret_change_me_123456
      - JWT_REFRESH_SECRET=dev_refresh_secret_change_me_123456
      - JWT_ACCESS_TTL=15m
      - JWT_REFRESH_TTL=30d
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:5174
    depends_on:
      - mongo
volumes:
  mongo_data:

